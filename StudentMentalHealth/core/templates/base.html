<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Student Mental Health{% endblock %}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg:       #121212;
    --surface:  #121212;
    --card:     #121212;
    --border:   #D8B2B6;
    --accent:   #f4a261;
    --accent2:  #f4a261;
    --positive: #8FA36D;
    --neutral: #eee239;
    --negative: #e63946;
    --text:     #d6d6d6;
    --muted:    #b9b7b7;
;
    --radius:   8px;
}

{
#D8B2B6
#E8E2D6
#9AA97A
#B8C59A
#8FA36D
#B4BE8C
#D7D0A6
#E3C7A6
#A98C74
#B79B83
#E6D8C2
#A9B18A
}

body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
}

.navbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
}
.navbar-brand { font-size: 1rem; font-weight: 600; color: var(--text); text-decoration: none; letter-spacing: 0.02em; }
.navbar-links { display: flex; gap: 1.5rem; align-items: center; }
.navbar-links a { color: var(--muted); text-decoration: none; font-size: 0.875rem; transition: color 0.15s; }
.navbar-links a:hover { color: var(--text); }

.container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
.container-wide { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    margin-bottom: 1.25rem;
}

h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.5rem; }
h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.75rem; }
h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem; }

p { color: var(--muted); margin-bottom: 1rem; }

.form-group { margin-bottom: 1.25rem; }
.form-group label { display: block; font-size: 0.875rem; color: var(--muted); margin-bottom: 0.375rem; }
.form-group input,
.form-group select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 0.6rem 0.875rem;
    font-size: 0.9rem;
    transition: border-color 0.15s;
}
.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--accent2);
}
.form-group select option { background: var(--card); }

.btn {
    display: inline-block;
    padding: 0.6rem 1.5rem;
    border-radius: var(--radius);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    text-decoration: none;
    transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn-primary  { background: var(--accent);   color: #fff; }
.btn-secondary { background: var(--card);    color: var(--text); border: 1px solid var(--border); }
.btn-success  { background: var(--positive); color: #fff; }
.btn-sm { padding: 0.35rem 0.875rem; font-size: 0.8rem; }

.badge {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
}
.badge-low      { background: #1a3a30; color: #2a9d8f; }
.badge-moderate { background: #3a2a10; color: #f4a261; }
.badge-high     { background: #3a1a1a; color: #e63946; }

.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; text-align: center; }
.stat-card .stat-value { font-size: 2rem; font-weight: 700; }
.stat-card .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }

table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
th { text-align: left; padding: 0.6rem 0.75rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
td { padding: 0.7rem 0.75rem; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--card); }

.messages { list-style: none; margin-bottom: 1rem; }
.messages li { padding: 0.7rem 1rem; border-radius: var(--radius); margin-bottom: 0.5rem; font-size: 0.875rem; }
.messages li.error   { background: #3a1a1a; color: #e63946; border: 1px solid #5a2a2a; }
.messages li.success { background: #1a3a30; color: #2a9d8f; border: 1px solid #1a5a40; }
.messages li.info    { background: #1a2a3a; color: #8d99ae; border: 1px solid #2a3a5a; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1.5rem; }
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

.divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

.text-muted  { color: var(--muted); }
.text-accent { color: var(--accent); }
.text-right  { text-align: right; }
.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.flex { display: flex; align-items: center; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
</style>
</head>
<body>

<nav class="navbar " >
  
        <a class="navbar-brand " href="/" >Student Mental Health</a>
        <div class="navbar-links">
            {% if user.is_authenticated %}
                {% if user.is_staff %}
                    <a href="{% url 'admin_dashboard' %}">Dashboard</a>
                {% else %}
                    <a href="{% url 'survey_list' %}">Surveys</a>
                {% endif %}
                <a href="{% url 'logout' %}">Log out</a>
            {% endif %}
  
    </div>
</nav>

<div>
    {% if messages %}
    <div class="container mt-2">
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
